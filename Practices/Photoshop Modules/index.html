<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image Resizing Basics</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; }
    h1 { color: #333; }
    .gallery { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
    .item { text-align: center; }
    .item img { width: 100%; border: 1px solid #ddd; border-radius: 4px; }
    .item p { margin: 8px 0; font-weight: bold; color: #555; }
  </style>
</head>
<body>
  <h1>Image Resizing Basics</h1>
  <div class="gallery">
    <div class="item">
      <p>Crop & Straighten</p>
      <img src="Crop_Straighten.jpg" alt="Crop Straighten">
      <img src="Crop_Straighten-v2.jpg" alt="Crop Straighten v2">
    </div>
    <div class="item">
      <p>Expand Canvas</p>
      <img src="Expand_Canvas.jpg" alt="Expand Canvas">
      <img src="Expand_Canvas-v2.jpg" alt="Expand Canvas v2">
    </div>
    <div class="item">
      <p>Resize</p>
      <img src="Resize.jpg" alt="Resize">
      <img src="Resize-v2.jpg" alt="Resize v2">
    </div>
    <div class="item">
      <p>Resolution</p>
      <img src="Resolution.jpg" alt="Resolution">
      <img src="Resolution-v2.jpg" alt="Resolution v2">
    </div>
  </div>
  <br>
  <p><a href="../../../index.html">← Back to Home</a></p>
</body>
</html>
