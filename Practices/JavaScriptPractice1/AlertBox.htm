<!DOCTYPE html>
<html>
  <head>
    <title>Alert Box</title>
    <script type="text/javascript">
      /*
        This is a multi-line comment.
        The code below triggers an alert popup.
      */

      // This is a single-line comment
      alert("Hello! Welcome to my JavaScript page.");
    </script>
  </head>
  <body>
    <h1>Alert Box Example</h1>
    <p>The alert popped up when the page loaded!</p>
  </body>
</html>
